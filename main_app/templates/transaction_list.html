{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Transactions</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Customer</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for transaction in transactions %}
            <tr>
                <td>{{ transaction.customer.name }}</td>
                <td>{{ transaction.amount }}</td>
                <td>{{ transaction.date }}</td>
                <td>
                    <a href="{% url 'transaction_edit' transaction.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'transaction_delete' transaction.id %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Add Transaction Button -->
    <div class="mt-3">
        <a href="{% url 'transaction_create' %}" class="btn btn-primary">Add Transaction</a>
    </div>
</div>
{% endblock %}
