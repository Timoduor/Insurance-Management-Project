{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>{% if form.instance.pk %}Edit {{ form.instance._meta.model.__name__ }}{% else %}Create New {{ form.instance._meta.model.__name__ }}{% endif %}</h2>
    
    <form method="post">
        {% csrf_token %}
        <!-- Render form fields dynamically -->
        <div class="form-group">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="btn btn-success">
            {% if form.instance.pk %}Update {{ form.instance._meta.model.__name__ }}{% else %}Save {{ form.instance._meta.model.__name__ }}{% endif %}
        </button>
        <a href="{% url form.instance._meta.model.__name__.lower() %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
