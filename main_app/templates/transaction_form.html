{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>{% if form.instance.pk %}Edit Transaction{% else %}Create New Transaction{% endif %}</h2>
    
    <form method="post">
        {% csrf_token %}
        <!-- Render form fields dynamically -->
        <div class="form-group">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="btn btn-success">
            {% if form.instance.pk %}Update Transaction{% else %}Save Transaction{% endif %}
        </button>
        <a href="{% url 'transaction_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
